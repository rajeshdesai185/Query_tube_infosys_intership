 {!isRegistering && (
                    <div style={{ padding: "20px", backgroundColor: "#f8fafc", borderRadius: "12px", border: "1px solid #e5e7eb" }}>
                      <h4 style={{ fontSize: "14px", fontWeight: "600", color: "#374151", margin: "0 0 12px 0", textAlign: "center" }}>
                        Demo Credentials
                      </h4>
                      <div style={{ display: "flex", flexDirection: "column", gap: "8px" }}>
                        {[
                          { role: "User", creds: "user / userpassword" },
                          { role: "Admin", creds: "admin / adminpassword" },
                        ].map(({ role: r, creds }) => (
                          <div key={r} style={{ display: "flex", justifyContent: "space-between", fontSize: "13px", color: "#6b7280" }}>
                            <span>{r}:</span>
                            <code style={{ backgroundColor: "#e5e7eb", padding: "2px 6px", borderRadius: "4px", fontSize: "12px" }}>{creds}</code>
                          </div>
                        ))}
                      </div>
                    </div>
                  )}
